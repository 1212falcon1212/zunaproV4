services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.zunapro.com
    depends_on:
      - api
    networks:
      - zunapro

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.zunapro.com
    depends_on:
      - api
    networks:
      - zunapro

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
      - nats
    networks:
      - zunapro

  provisioner:
    build:
      context: services/provisioner
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - nginx_tenant_conf:/etc/nginx/tenant.d
    depends_on:
      - postgres
      - nats
      - minio
    networks:
      - zunapro

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl-params.conf:/etc/nginx/ssl-params.conf:ro
      - nginx_tenant_conf:/etc/nginx/tenant.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - web
      - admin
      - api
    networks:
      - zunapro

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    networks:
      - zunapro

volumes:
  nginx_tenant_conf:
  certbot_www:
  certbot_conf:

networks:
  zunapro:
    driver: bridge
